
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VibriAlert</title>

<style>
body {
    font-family: Arial;
    background: #121212;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    text-align: center;
    background: #1e1e1e;
    padding: 30px;
    border-radius: 10px;
    width: 300px;
}

input, select, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 5px;
}

label {
    display: block;
    margin-top: 10px;
    text-align: left;
    font-size: 14px;
}

button {
    background: #4CAF50;
    color: white;
    font-size: 16px;
}

button.stop {
    background: #ff4444;
}

button.fullstop {
    background: #888;
}

h1 {
    margin-bottom: 20px;
}
</style>

</head>
<body>

<div class="container">
    <h1>VibriAlert</h1>

    <label>From Time:</label>
    <input type="time" id="startTime">

    <label>To Time:</label>
    <input type="time" id="endTime">

    <input type="number" id="interval" placeholder="Interval (minutes)">

    <select id="intensity">
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
    </select>

    <button onclick="startVibration()">START</button>
    <button class="stop" onclick="stopVibration()">STOP VIBRATION</button>
    <button class="fullstop" onclick="fullStop()">FULL STOP</button>

    <p id="status">Status: Stopped</p>
</div>

<script>
// Global variables
let intervalTimer;
let vibrationTimer;
let isRunning = false;


// Vibration patterns
function getVibrationPattern(intensity) {
    if (intensity === "low") return [200, 100, 200];
    if (intensity === "medium") return [400, 200, 400];
    if (intensity === "high") return [800, 300, 800];
}


// Start function
function startVibration() {

    let intervalMin = parseFloat(document.getElementById("interval").value);
    let intensity = document.getElementById("intensity").value;
    let startTime = document.getElementById("startTime").value;
    let endTime = document.getElementById("endTime").value;

    if (!intervalMin || intervalMin <= 0 || !startTime || !endTime) {
        alert("Enter valid inputs");
        return;
    }

    let intervalMs = intervalMin * 60 * 1000;
    let pattern = getVibrationPattern(intensity);

    isRunning = true;

    document.getElementById("status").innerText = "Status: Waiting for next alert...";

    // Main interval loop
    intervalTimer = setInterval(() => {

        let now = new Date();

        let start = new Date();
        let end = new Date();

        let [sh, sm] = startTime.split(":");
        let [eh, em] = endTime.split(":");

        start.setHours(sh, sm, 0);
        end.setHours(eh, em, 0);

        // Check if within time range
        if (now >= start && now <= end && isRunning) {

            startContinuousVibration(pattern);

        }

    }, intervalMs);
}


// Continuous vibration
function startContinuousVibration(pattern) {

    document.getElementById("status").innerText = "Status: Vibrating... Press STOP";

    clearInterval(vibrationTimer);

    vibrationTimer = setInterval(() => {
        if (navigator.vibrate && isRunning) {
            navigator.vibrate(pattern);
        }
    }, 800);
}


// Stop only vibration
function stopVibration() {

    clearInterval(vibrationTimer);

    if (navigator.vibrate) {
        navigator.vibrate(0);
    }

    document.getElementById("status").innerText = "Status: Waiting for next alert...";
}


// Full stop everything
function fullStop() {
    isRunning = false;

    clearInterval(intervalTimer);
    clearInterval(vibrationTimer);

    if (navigator.vibrate) {
        navigator.vibrate(0);
    }

    document.getElementById("status").innerText = "Status: Stopped";
}
</script>

</body>
</html>
